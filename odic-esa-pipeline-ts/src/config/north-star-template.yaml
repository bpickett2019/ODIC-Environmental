  writing_style:
    voice: "third-person, formal, technical"
    tense: "past tense for observations and actions; present tense for current conditions and assessments"
    entity_reference: "ODIC referred to as 'ODIC' throughout; property referred to as 'the Property' (capitalized)"
    sentence_structure: "declarative; avoids hedging; uses 'assessed to be' rather than 'might be'"
    paragraph_structure: "topic sentence stating condition, followed by supporting evidence, followed by assessment"

    introduction_sample: |
      ODIC Environmental (ODIC) performed a Phase I Environmental Site Assessment Report (hereinafter
      referred as "Phase I ESA" or "Report") of the Property in conformance with the scope and limitations of
      the ASTM International, formerly known as the American Society for Testing and Materials (ASTM),
      Standard Practice for Environmental Site Assessments: Phase I Environmental Site Assessment Process,
      ASTM Designation E1527-21.
      This Report documents the methods and findings of the Phase I ESA performed in general conformance
      with the scope and limitations of ASTM Standard Practice E1527-21 and the Environmental Protection
      Agency Standards and Practices for All Appropriate Inquiries (40 CFR Part 312) for the Property.
      This Report has been prepared by ODIC for the Client under the professional supervision of the principal
      and/or senior staff whose seal(s) and signature(s) appear hereon. Neither ODIC, nor any staff member
      assigned to this investigation has any interest or contemplated interest, financial or otherwise, in the
      subject or surrounding properties, or in any entity which owns, leases, or occupies the subject or
      surrounding properties or which may be responsible for environmental issues identified during the course
      of this investigation, and has no personal bias with respect to the parties involved.

    purpose_and_objective_sample: |
      The purpose of this practice is to define good commercial and customary practice for conducting an
      environmental site assessment of a parcel(s) of commercial real estate with respect to the range of
      contaminants within the scope of Comprehensive Environmental Response, Compensation and Liability
      Act (CERCLA) (42 U.S.C. section 9601) and petroleum products. As such, this practice is intended to permit a
      User (Client, Purchaser, Lender, Owner) to satisfy one of the requirements to qualify for the innocent
      landowner, contiguous property owner, or bona fide prospective purchaser limitations on CERCLA liability
      (hereinafter, the "landowner liability protections," or "LLPs"): that is, the practice that constitutes "all
      appropriate inquiry into the previous ownership and uses of the Property consistent with good commercial
      or customary standards and practices" as defined at 42 U.S.C. section 9601(35)(B).
      Another purpose of this Phase I ESA may be to assist the Client in its underwriting of a proposed
      mortgage loan on the Property, if this Report is prepared as a part of a pre-financing environmental due
      diligence, and to identify Recognized Environmental Conditions (RECs) in connection with the Property
      described in this Report.

    property_description_sample: |
      The Property is a 0.36-acre parcel that is improved with a 1,728-square-foot shop building and a 1,554-
      square-foot office building. The Property is occupied by Pest Options, Inc., a pest control service that
      uses the Property for office space, truck parking, and supplies storage. The remainder of the site is
      concrete-paved parking and yard areas.

    physical_setting_topography_sample: |
      The Property's physical location was researched employing a United States Geological Survey (USGS)
      7.5-Minute Topographic Quadrangle (Quad) Map relevant to the Property. The USGS 7.5-Minute Quad
      Map has an approximate scale of 1 inch to 2,000 feet, and may show physical features with
      environmental significance such as wetlands, water bodies, roadways, mines, and buildings. The
      elevation of the Property is approximately 170 feet above mean sea level. There is a regional downslope to
      the west.

    reconnaissance_narrative_sample: |
      The Property is occupied by a pest control service.
      Containers and small drums of herbicides and pesticides were in the shop building and in a canopied
      area south of the shop building. No storage deficiencies were observed. A rinse basin and an open-
      topped tank were on the south portion of the Property. They are used to rinse herbicides/pesticides from
      equipment (tanks, sprayers, etc.). The residual wastewater is stored in the tank until it is evaporated or
      disposed of by a licensed waste hauler.
      A drain and a clarifier are centrally located in the yard area of the Property. Per a 2001 subsurface
      investigation (see Section 5.2), no significant contamination was identified in the area of the clarifier, and
      the clarifier does not appear to have been in use since then other than for stormwater discharge. As such,
      the clarifier is not assessed to be indicative of environmental risk to the Property.
      Concrete patching was observed in the yard area, which was consistent in appearance with the
      locations of former USTs. Refer to Section 5.2 for further details.

    historical_aerial_photos_sample: |
      ODIC reviewed historical aerial photographs supplied by the EDR Aerial Photo Decade Package. Images
      were available for the years 1938, 1947, 1953, 1963, 1972, 1977, 1987, 1990, 1995, 2005, 2010, 2014,
      2018, and 2022. The Property was used for orchard crop agriculture in the 1938 and 1947 images, and
      was vacant land in the 1953 image. The Property was similarly developed to the present in the 1963 and
      later images.
      The vicinity was used for orchard crop agriculture in the 1938 and 1947 images. In the 1953 image
      adjacent areas to the north, west, and east were vacant land, and the south-adjacent area remained
      agricultural. In the 1963 through 1977 images the current industrial buildings were north, west, and east,
      and a small commercial building or a residence was south. The vicinity was similarly developed to the
      present in the 1987 and later images.

    findings_rec_sample: |
      This environmental assessment has revealed the following REC in connection with the Property:
      The Property is within an area of regional groundwater contamination identified as the Orange
      County North Basin National Priority List (NPL) site. The Orange County North Basin site is an
      area of groundwater contamination approximately five miles long and up to two miles wide.
      Chlorinated solvents are present in groundwater, including PCE, TCE, 1,1-DCE, 1,4-dioxane,
      and others. Per 2022 groundwater monitoring data, VOC concentrations in groundwater in the
      area of the Property are low (refer to Section 5.3 for details). Site assessment, characterization,
      and remediation are underway under the oversight of the United States Environmental
      Protection Agency and state and local agencies. The Property is not a contributor to the
      contamination, and local groundwater is over 100 feet below grade. The regional contamination
      is not assessed to pose significant environmental risk to the Property. However, the
      groundwater contamination is assessed to be an REC pursuant to ASTM Standard Practice
      E1527-21.

    findings_crec_sample: |
      The Property (listed as Atlas Copco Rental, Inc.) is associated with a Leaking Underground
      Storage Tank (LUST) case that was opened in 1997 due to a gasoline and diesel fuel release
      from a former underground storage tank (UST) that impacted soil and soil vapor (groundwater
      was not impacted). The case was closed in 2004. Minor residual contamination was permitted
      by the oversight agency to remain in place at the time of case closure. Details are provided in
      Section 5.2. The residual contamination is assessed to be a CREC pursuant to ASTM Standard
      Practice E1527-21.

    conclusions_sample: |
      ODIC performed a Phase I Environmental Site Assessment of the Property in conformance with the
      scope and limitations of ASTM Standard Practice E1527-21.
      ODIC recommends No Further Investigation at this time.

    sba_discussion_sample: |
      It is ODIC's understanding that environmental risk to the Property from the regional groundwater
      contamination is mitigated pursuant to SBA SOP 50 10 8 since the Federal Government under the
      Superfund program is overseeing remediation/corrective action, and the Federal Superfund Program is
      considered an entity with sufficient resources (item vii above).
      The Property (listed as Atlas Copco Rental, Inc.) is associated with a Leaking Underground Storage Tank
      (LUST) case that was opened in 1997 due to a gasoline and diesel fuel release from a former
      underground storage tank (UST) that impacted soil and soil vapor (groundwater was not impacted). The
      case was closed in 2004. Minor residual contamination was permitted by the oversight agency to remain
      in place at the time of case closure. Details are provided in Section 5.2. The residual contamination is
      assessed to be a CREC pursuant to ASTM Standard Practice E1527-21.
      It is ODIC's understanding that environmental risk to the Property from the residual contamination is
      mitigated pursuant to SBA SOP 50 10 8 since a "no further action letter" has been issued by the oversight
      agency (item iii above).
      No further action is recommended at this time.

    database_procedure_sample: |
      The most current databases sources maintained by state and federal offices were provided by
      governmental record search database suppliers, such as Environmental Data Resources (EDR). For
      definitions of database acronyms, review the database report in Appendix C and/or refer to ASTM
      Standard Practice E1527-21, Sections 3.3 and 8.2.
      Database sources maintained by local offices were obtained via records requests. Databases were
      searched for properties with reported environmental listings within distances specified by ASTM Standard
      Practice E1527-21, either by using geocoding information that identified the coordinates of the properties
      in the databases or by checking the street addresses of practically reviewable non-geocoded "orphan"
      properties within the same zip code.

    references_sample: |
      During the preparation of this Report, a number of sources were contacted, individuals were interviewed,
      and various federal, state, county or local municipal agencies were consulted. Documentation applicable
      to the Property in those departments and agencies was requested and reviewed when and where
      reasonably ascertainable, as detailed in ASTM Standard Practice E1527-21. Individuals listed without
      phone numbers were contacted in person or by e-mail. Reference sources for site-specific information,
      hydrogeologic setting, technical data, historical research data, environmental reports and other records
      used are identified throughout this Report in corresponding sections.

    negative_finding_patterns:
      - "None were observed."
      - "None were identified."
      - "No significant data gaps were identified during the course of this assessment."
      - "No features of environmental concern were identified."
      - "There was no indication of a significant risk of vapor intrusion at the Property."
      - "No sites were identified that pose a significant risk of vapor intrusion to the Property."

