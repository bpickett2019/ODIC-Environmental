  boilerplate:
    astm_reference: |
      ASTM International, formerly known as the American Society for Testing and Materials (ASTM),
      Standard Practice for Environmental Site Assessments: Phase I Environmental Site Assessment Process,
      ASTM Designation E1527-21.

    rec_definition: |
      ASTM Standard Practice E1527-21 defines a Recognized Environmental Condition (REC) as: (1) the
      presence of hazardous substances or petroleum products in, on, or at the subject property due to a
      release to the environment; (2) the likely presence of any hazardous substances or petroleum products
      in, on, or at a the subject property: (1) due to release to the environment; (a release) under conditions
      indicative of a or likely release to the environment; or (3) the presence of hazardous substances or
      petroleum products in, on, or at the subject property under conditions that pose a material threat of a
      future release to the environment.

    hrec_definition: |
      ASTM Standard Practice E1527-21 defines a Historical Recognized Environmental Condition (HREC) as:
      a previous release of hazardous substances or petroleum products affecting the subject property that has
      been addressed to the satisfaction of the applicable regulatory authority or authorities and meeting
      unrestricted use criteria established by the applicable regulatory authority or authorities without subjecting
      the subject property to any controls (for example, activity and use limitations or other property use
      limitations). A historical recognized environmental condition is not a recognized environmental condition.

    crec_definition: |
      ASTM Standard Practice E1527-21 defines a Controlled Recognized Environmental Condition (CREC)
      as: recognized environmental condition affecting the subject property that has been addressed to the
      satisfaction of the applicable regulatory authority or authorities with hazardous substances or petroleum
      products allowed to remain in place subject to implementation of required controls (for example, activity
      and use limitations or other property use limitations).

    de_minimis_definition: |
      ASTM Standard Practice E1527-21 defines a de minimis condition as: a condition related to a release
      that generally does not present a threat to human health or the environment and that generally would
      not be the subject of an enforcement action if brought to the attention of appropriate governmental
      agencies. A condition determined to be a de minimis condition is not a recognized environmental
      condition nor a controlled recognized environmental condition.

    scope_limitations: |
      This Report was prepared for the exclusive use of the Client or User of this Report. The information
      reported was obtained through sources deemed reasonably ascertainable, as defined in ASTM Standard
      Practice E1527-21; a visual survey of areas readily observable, easily accessible or made accessible by
      the Property contact, and interviews with owners, agents, occupants, or other appropriate persons
      involved with the Property. Municipal information was obtained through file reviews of reasonably
      ascertainable standard government record sources, and interviews with the authorities having jurisdiction
      over the Property. Findings, conclusions, and recommendations included in the Report are based on our
      visual observations in the field, the municipal information reasonably obtained, information provided by
      the Client (or User), and/or a review of readily available and supplied documents.

    limitations_and_exceptions: |
      ODIC renders no opinion as to the Property condition at un-surveyed and/or inaccessible portions of the
      Property, which are described below. ODIC relies completely on the information, whether written, graphic
      or verbal, provided by the Property contact or as shown on any documents reviewed or received from the
      Property contact, owner or agent, or municipal source, and assumes that information to be true and
      correct. The observations in this Report are valid on the date of the survey. Where access to portions of
      the Property or to structures on the Property was unavailable or limited, ODIC renders no opinion as to
      the presence of petroleum products or hazardous substances in that portion of the Property or structure.

    cercla_requirements: |
      CERCLA Requirements Other Than All Appropriate Inquiry (ASTM Standard Practice E1527-21 1.1.3) -
      This practice does not address whether requirements in addition to All Appropriate Inquiries have been
      met in order to qualify for the LLPs (specified in 42 U.S.C. section 9607(b)(3)(a) and (b) including the continuing
      obligation not to impede the integrity and effectiveness of Activity and Use Limitations), or the duty to take
      reasonable steps to prevent releases, or the duty to comply with legally required release reporting
      obligations).

    standard_of_care: |
      The Phase I ESA was conducted in a manner consistent with the level of care and skill ordinarily
      exercised by members of the profession, and in accordance with generally accepted practices of other
      consultants currently practicing in the same locality under similar conditions. No other representation,
      expressed or implied, and no warranty or guarantee is included or intended. The Report speaks only as of
      its date, in the absence of a specific written update of the Report, signed and delivered by ODIC.

    non_scope_disclaimer: |
      Evaluation of Non-Scope or Non-CERCLA items, including those addressed in Section 3.5 of this Report,
      is not required nor relevant for compliance with the AAI Rule or ASTM Standard Practice E1527-21.
      Inclusion of any non-scope item in a Phase I Environmental Site Assessment report is entirely within the
      discretion of the User based on its own risk tolerance. Non-Scope Consideration should not be construed
      as requiring the inclusion of any non-scope issues in a Phase I Environmental Site Assessment report.

    user_reliance: |
      This investigation was conducted in accordance with the Client's Environmental Site Assessment scope
      of work for the use and benefit of the Client and assignees. It is based, in part, upon documents, writings,
      and information owned, possessed, or secured by the Client. Neither this Report, nor any information
      contained herein, shall be used or relied upon for any purpose by any other person or entity without the
      express written permission of the Client.

    ep_qualification: |
      ODIC states that this ESA was performed under Environmental Professional (EP)'s direct supervision,
      that he/she has prepared and/or reviewed and approved the Report, and that the methods and
      procedures utilized in the development of this Report conform at least to minimum industry standards
      using both the ASTM International, formerly known as the American Society for Testing and Materials
      (ASTM), Standard Practice E1527-21 and the United States - Environmental Protection Agency
      Standards and Practices for All Appropriate Inquiries (40 CFR Part 312) as guidelines. ODIC certifies that
      ODIC's Environmental Professionals and Subcontractors are properly licensed, qualified, and/or certified
      to conduct Phase I Environmental Site Assessments.

    independent_contractor: |
      In performing Services under the mutually agreed contractual agreement and engagement, ODIC
      operates as, and has the status of, an independent contractor. Subject to any limitations established by
      the Client as to the degree of care and amount of time and expenses to be incurred and any other
      limitations contained in the mutually agreed contractual agreement and engagement, ODIC performs the
      Services consistent with the level of care and skill ordinarily exercised by other professional consultants
      under similar circumstances at the time the Services are performed.

    transmittal_letter: |
      Attached please find our PHASE I ENVIRONMENTAL SITE ASSESSMENT, ("the Report") for the above-mentioned Subject Property.
      This report has been prepared by Odic for the Client under the professional supervision of the principal and/or senior staff. Neither Odic,
      nor any staff member assigned to this investigation has any interest or contemplated interest, financial or otherwise, in the subject or
      surrounding properties, or in any entity which owns, leases, or occupies the subject or surrounding properties, and has no personal bias
      with respect to the parties involved.
      The assessment was conducted in a manner consistent with the level of care and skill ordinarily exercised by members of the profession,
      and in accordance with generally accepted practices of other consultants currently practicing in the same locality under similar conditions.
      No other representation, expressed or implied, and no warranty or guarantee is included or intended. The Report speaks only as of its date,
      in the absence of a specific written update of the Report, signed and delivered by Odic.
      There are no intended or unintended third party beneficiaries to this Report, unless specifically named. Odic is an independent contractor,
      not an employee of either the issuer or the borrower, and its compensation was not based on the findings or recommendations made in the
      Report or on the closing of any business transaction.

    reliance_letter_ep_certification: |
      Michael Miller ("Environmental Professional") meets the definition of an Environmental
      Professional as defined by 40 C.F.R. section 312.10(b) and has performed or supervised the
      performance of the following "Environmental Investigation(s)" (check all that apply):

    reliance_letter_sba_reliance: |
      Reliance by SBA and Lender. Environmental Professional (and Environmental Professional's
      firm, where applicable) understand(s) that the Property may serve as collateral for an SBA-
      guaranteed loan, a condition for which is an Environmental Investigation of the Property by an
      Environmental Professional. Environmental Professional (and Environmental Professional's firm,
      where applicable) authorize(s) Lender and SBA to use and rely upon the Environmental
      Investigation.

    reliance_letter_insurance: |
      Insurance Coverage. Environmental Professional (and/or Environmental Professional's firm,
      where applicable) certifies that they or the firm were covered as of the date of the Environmental
      Investigation by errors and omissions liability insurance with a minimum coverage of $1,000,000
      per claim (or occurrence) and that evidence of this insurance is attached.

    reliance_letter_impartiality: |
      Impartiality. Environmental Professional certifies that (1) to the best of their knowledge,
      Environmental Professional is independent of and not a representative, nor an employee or
      affiliate of seller, Borrower, operating company, or any person in which seller has an ownership
      interest; and (2) the Environmental Professional has not been unduly influenced by any person
      with regard to the preparation of the Environmental Investigation or the contents thereof.

    acbm_non_scope: |
      Since an asbestos survey is not included in the scope of services for this Phase I ESA, ODIC did not
      test suspect asbestos-containing building materials (ACBM) at the Property. However, because
      improvements at the Property were constructed prior to 1978, the presence of ACBM is possible.
      It is important to note that State and Federal Laws impose special requirements for handling these
      materials, especially in the event of remodeling or demolition that may impact these materials. Prior to
      any remodeling or demolition, the Property owner must have properly certified personnel test all suspect
      ACBM to be disturbed by the work.

    lbp_non_scope: |
      Since a lead-based paint survey is not included in the scope of services for this Phase I ESA, ODIC did
      not test suspect lead-based paint (LBP) at the Property. However, because improvements at the
      Property were constructed prior to 1978, the presence of LBP is possible.
      It is important to note that State and Federal Laws impose special requirements for handling these
      materials, especially in the event of remodeling or demolition that may impact these materials.

    radon_non_scope: |
      Since a radon survey is not included in the scope of services for this Phase I ESA, ODIC did not test
      for radon at the Property.
      Radon is a naturally-occurring, odorless, invisible gas. Natural radon levels vary and are closely related
      to geologic formations. Radon may enter buildings through basement sumps or other openings.

    vapor_encroachment_intro: |
      ODIC performed a Phase I Environmental Site Assessment of the Property in conformance with the
      scope and limitations of ASTM Standard Practice E1527-21. It should be noted that ASTM Standard
      Practice E1527-21 does not necessarily comply with the ASTM Standard Practice E2600-15 "Standard
      Guide for Vapor Encroachment Screening on Property Involved in Real Estate Transactions." For
      assessment of potential "vapor encroachment conditions" (VECs) and to determine if a "vapor intrusion
      condition" (VIC) exists on-site, additional investigation beyond ASTM Standard Practice E1527-21 is
      required.

    adjoining_properties_note: |
      Note: Section 8.3.9 of ASTM Standard Practice E1527-21 states: During research of the subject
      property, as described in Section 8.3.8 of ASTM Standard Practice E1527-21, uses of the adjoining
      properties that are obvious shall be identified to evaluate the likelihood that past uses of the adjoining
      properties have led to recognized environmental conditions in connection with the subject property.

    pfas_negative: |
      There was no evidence from any researched source that per- and polyfluoroalkyl substances (PFAS),
      perfluorooctanoic acid, or perfluorooctanesulfonic acid were historically used at the Property.

    sba_mitigating_factors_preamble: |
      Per SBA SOP 50 10 8 Chapter 5, section E Environmental Policies and Procedures:
      Loans may not be approved or disbursed if there is known Contamination or on-going Remediation at the
      Property unless the risks have been minimized to the satisfaction of SBA. SBA Lenders seeking loan
      approval or disbursement authority despite Contamination or on-going Remediation at the Property must
      submit a recommendation to SBA that includes, at a minimum, a discussion of the following:

    sba_mitigating_factors:
      - id: "i"
        title: "Indemnification"
      - id: "ii"
        title: "Completed Remediation"
      - id: "iii"
        title: "No Further Action"
      - id: "iv"
