        title: "Contamination Originating from another Site"
      - id: "viii"
        title: "Additional or Substitute Collateral"
      - id: "ix"
        title: "Other Factor(s)"

    agency_response_pending: |
      "Agency Response Pending," if noted above, indicates that a public records request has been
      submitted under the Freedom of Information Act but a response has not been received by ODIC. If
      information is subsequently received which alters the conclusions of this assessment, a report
      addendum will be provided. However, based on available Property history information, it is unlikely that
      any further information will alter the conclusions of this assessment.

    history_section_intro: |
      The objective of consulting historical sources is to develop a history of the previous uses of the Property
      and surrounding area, in order to help identify the likelihood of past uses having led to Recognized
      Environmental Conditions (RECs), Controlled Recognized Environmental Conditions (CRECs), or
      Historical Recognized Environmental Conditions (HRECs) in connection with the Property.

    sanborn_maps_not_available: |
      EDR responded that Sanborn Map Company fire insurance maps were not drawn for the Property or
      surrounding vicinity.

    user_provided_info_intro: |
      The United States Environmental Protection Agency (USEPA) All Appropriate Inquiry (AAI) and ASTM
      Standard Practice E1527-21 Phase I Standards require that the Report User conduct independent
      research and consider certain information before purchasing a property.

