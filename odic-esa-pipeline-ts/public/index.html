              }
              if (evt.phase === 'compressed' && !evt.skipped) {
                assemblySteps[assemblySteps.length - 1] = { text: 'Compressed: ' + evt.inputSizeMB + 'MB → ' + evt.outputSizeMB + 'MB (' + evt.reductionPercent + '% smaller)', status: 'done' };
                updateLastThinking(b => ({ ...b, steps: assemblySteps.map(s => ({...s})) }));
              }

              // Splitting
              if (evt.phase === 'splitting') {
                assemblySteps.push({ text: evt.message, status: 'active' });
                updateLastThinking(b => ({ ...b, steps: assemblySteps.map(s => ({...s})) }));
              }
              if (evt.phase === 'split') {
                assemblySteps[assemblySteps.length - 1] = { text: 'Split into ' + evt.totalParts + ' parts', status: 'done' };
                updateLastThinking(b => ({ ...b, steps: assemblySteps.map(s => ({...s})) }));
              }

              // QC
              if (evt.phase === 'qc') {
                setBlocks(prev => [...prev, { type: 'thinking', title: 'Quality Check', steps: [{ text: 'Running QC checks...', status: 'active' }], active: true }]);
              }
              if (evt.phase === 'qc_complete' && !evt.skipped) {
                updateLastThinking(b => ({ ...b, active: false, steps: [
                  { text: 'Score: ' + evt.score + '/100 — ' + (evt.passed ? 'PASSED' : 'NEEDS REVIEW'), status: evt.passed ? 'done' : 'active' },
                  ...evt.checks.map(c => ({ text: (c.status === 'pass' ? '\u2713' : c.status === 'warn' ? '\u26a0' : '\u2717') + ' ' + c.label + ': ' + c.detail, status: c.status === 'pass' ? 'done' : 'active' })),
                ]}));
                setBlocks(prev => [...prev, { type: 'qc', data: evt }]);
              }

              // AI QC review
              if (evt.phase === 'ai_qc' && currentPhase !== 'ai_qc') {
                currentPhase = 'ai_qc';
                setBlocks(prev => [...prev, { type: 'thinking', title: 'AI Quality Review', steps: [{ text: evt.message || 'AI reviewing assembled report...', status: 'active' }], active: true }]);
              }
              if (evt.phase === 'ai_qc' && currentPhase === 'ai_qc' && evt.message) {
                updateLastThinking(b => ({ ...b, steps: [{ text: evt.message, status: 'active' }] }));
              }
              if (evt.phase === 'ai_qc_complete') {
                updateLastThinking(b => ({ ...b, active: false, steps: [{ text: 'AI review complete', status: 'done' }] }));
              }

              if (evt.phase === 'done') {
                updateLastThinking(b => ({ ...b, active: false }));
                setPid(evt.projectId);
                setBlocks(prev => [...prev, { type: 'result', data: evt }]);
                setPhase('done');
              }

              if (evt.phase === 'error') {
                setBlocks(prev => [...prev, { type: 'msg', text: 'Error: ' + evt.error }]);
                setPhase('error');
              }
            }
          }
        } catch (err) {
          setBlocks(prev => [...prev, { type: 'msg', text: 'Connection error: ' + err.message }]);
          setPhase('error');
        }
      };

      const handleFiles = (newFiles) => {
        const supportedExts = ['.pdf','.zip','.vsd','.vsdx','.doc','.docx','.xls','.xlsx','.jpg','.jpeg','.png','.tif','.tiff'];
        const accepted = Array.from(newFiles).filter(f => {
          const ext = f.name.toLowerCase();
          return supportedExts.some(e => ext.endsWith(e));
        });
        if (!accepted.length) return;
        setFiles(accepted);
        // Auto-start pipeline immediately
        runPipeline(accepted);
      };

      const reset = () => {
        setPhase('idle');
        setBlocks([]);
        setPid(null);
        setFiles([]);
      };

      const fmtBytes = (b) => {
        if (!b) return '0 B';
        const k = 1024, s = ['B','KB','MB','GB'];
        const i = Math.floor(Math.log(b)/Math.log(k));
        return Math.round(b/Math.pow(k,i)*100)/100+' '+s[i];
      };

      return (
        <div>
          {/* Hamburger (mobile only) */}
          <button className="hamburger" onClick={() => setSidebarOpen(!sidebarOpen)}>&#9776;</button>

          {/* Sidebar */}
          <div className="sidebar" style={window.innerWidth <= 768 && !sidebarOpen ? {display:'none'} : undefined}>
            <div className="sidebar-header">
              <div style={{fontWeight:700, fontSize:16, marginBottom:4}}>ODIC Environmental</div>
              <div style={{fontSize:12, color:'#888'}}>AI Report Assembly</div>
            </div>
            <div style={{padding:'12px 0', flex:1}}>
              {projectId ? (
                <>
                  <div className={'sidebar-item' + (currentView === 'report' ? ' active' : '')} onClick={() => setCurrentView('report')}>
                    <span>&#128196;</span>
                    <span>{projectId.slice(0,8)}</span>
                  </div>
                  <div className="sidebar-item" onClick={() => setSiteVisitActive(!siteVisitActive)} style={{color: siteVisitActive ? '#4ade80' : '#ccc'}}>
                    <span>&#128205;</span>
                    <span>Site Visit Mode</span>
                  </div>
                </>
              ) : (
                <div className={'sidebar-item' + (currentView === 'report' ? ' active' : '')} onClick={() => setCurrentView('report')}>
                  <span>&#10024;</span>
                  <span>New Report</span>
                </div>
              )}
              <div className={'sidebar-item' + (currentView === 'compress' ? ' active' : '')} onClick={() => setCurrentView('compress')}>
                <span>&#128295;</span>
                <span>PDF Tools</span>
              </div>
            </div>
            <div style={{padding:'12px 16px', borderTop:'1px solid #333', fontSize:12, color:'#666'}}>
              {health ? (
                <div>
                  <div>Pipeline: {health.pipelineReady ? <span style={{color:'#4ade80'}}>Ready</span> : 'Loading'}</div>
                  <div>AI: {health.aiEnabled ? <span style={{color:'#4ade80'}}>Haiku + Sonnet</span> : <span style={{color:'#fbbf24'}}>Disabled</span>}</div>
                </div>
              ) : <div>Connecting...</div>}
            </div>
          </div>

          {/* Main */}
          <div className="main">
            <div className="chat-area" ref={chatRef}>
              <div className="chat-inner">

                {/* PDF Tools View */}
                {currentView === 'compress' && <PDFToolsView />}

                {/* Report View */}
                {currentView === 'report' && phase === 'idle' && (
                  <div>
                    <div style={{textAlign:'center', padding:'40px 0 20px'}}>
                      <div style={{fontSize:36, marginBottom:12}}>&#127758;</div>
                      <h2 style={{fontSize:22, fontWeight:700, marginBottom:6}}>ODIC Environmental AI</h2>
                      <p style={{color:'var(--text-muted)', fontSize:15}}>Enter an address to research, or drop files to assemble a report.</p>
                    </div>

                    {/* Address → Full Report */}
                    <div style={{background:'white', border:'1px solid var(--border)', borderRadius:12, padding:16, marginBottom:16}}>
                      <div style={{fontSize:13, fontWeight:600, marginBottom:8, display:'flex', alignItems:'center', gap:6}}>
                        <span style={{fontSize:16}}>&#127758;</span> Address → Full Report — Type an address, get a complete Phase I ESA
                      </div>
                      <div className="research-input">
                        <input
                          type="text"
                          placeholder="e.g. 302 E Broadway, Vista, CA 92084"
                          value={researchAddr}
                          onChange={e => setResearchAddr(e.target.value)}
                          onKeyDown={e => { if (e.key === 'Enter' && !researching) runAddressReport(); }}
                        />
                        <button onClick={runAddressReport} disabled={researching || researchAddr.trim().length < 5}>
                          {researching ? 'Generating...' : 'Generate Report'}
                        </button>
                      </div>
                      <div style={{fontSize:12, color:'var(--text-muted)'}}>
                        Researches EPA, FEMA flood zone, soil, satellite imagery + state databases, then writes all 8 report sections and assembles a downloadable PDF. No documents needed.
                      </div>
                    </div>

                    <div style={{textAlign:'center', padding:'8px 0', fontSize:13, color:'var(--text-muted)', fontWeight:600}}>— or —</div>

                    <div className="upload-zone"
                      onClick={() => fileRef.current.click()}
                      onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('dragover'); }}
                      onDragLeave={e => e.currentTarget.classList.remove('dragover')}
                      onDrop={e => { e.preventDefault(); e.currentTarget.classList.remove('dragover'); handleFiles(e.dataTransfer.files); }}
                    >
                      <div style={{fontSize:40, marginBottom:12}}>&#128193;</div>
                      <div style={{fontWeight:600, fontSize:16, marginBottom:6}}>Drop your project files here to start</div>
                      <div style={{color:'var(--text-muted)', fontSize:14}}>
                        Drop any combination of files — PDFs, ZIPs, images, Office docs, VSD drawings. AI will classify, convert, write all narratives, and assemble your report automatically.
                      </div>
                    </div>
                    <input ref={fileRef} type="file" multiple accept=".pdf,.zip,.vsd,.vsdx,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.tif,.tiff" style={{display:'none'}}
                      onChange={e => handleFiles(e.target.files)} />
                  </div>
                )}

                {/* Running / Done — stream output */}
                {currentView === 'report' && phase !== 'idle' && blocks.map((block, i) => {
                  if (block.type === 'msg') {
                    return <div className="ai-msg" key={i}>{block.text}</div>;
                  }
                  if (block.type === 'thinking') {
                    return <ThinkingBlock key={i} title={block.title} steps={block.steps} active={block.active} />;
                  }
                  if (block.type === 'zip_exclusions') {
                    const totalExcluded = (block.data.excluded || []).reduce((s, r) => s + r.count, 0);
                    return (
                      <Artifact key={i} icon="&#128220;" title="Regulatory Dump Excluded" subtitle={`${totalExcluded} raw database files not included`}>
                        <div className="ai-msg" style={{fontSize:13, marginBottom:8}}>
                          The ZIP contained raw regulatory database export folders. These are reference data, not standalone ESA documents — they have been excluded from assembly.
                        </div>
                        <table className="result-table">
                          <thead><tr><th>Folder</th><th>Files Excluded</th></tr></thead>
                          <tbody>
                            {(block.data.excluded || []).map((r, j) => (
                              <tr key={j}>
                                <td style={{fontFamily:'monospace', fontSize:12}}>{r.folder}</td>
                                <td style={{textAlign:'right'}}>{r.count}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </Artifact>
                    );
                  }
                  if (block.type === 'file_selection') {
                    return (
                      <Artifact key={i} icon="&#128269;" title="Smart File Selection" subtitle={`${block.data.superseded} files skipped`}>
                        <div className="ai-msg" style={{fontSize:13, marginBottom:8}}>
                          Detected {block.data.superseded} superseded files (older revisions or unmerged originals). Using {block.data.selected} files.
                        </div>
                        <table className="result-table">
                          <thead><tr><th>Skipped File</th><th>Reason</th></tr></thead>
                          <tbody>
                            {(block.data.skippedFiles || []).map((f, j) => (
                              <tr key={j}>
                                <td style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={f.filename}>{f.filename}</td>
                                <td style={{fontSize:12,color:'var(--text-muted)'}}>{f.reason}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </Artifact>
                    );
                  }
                  if (block.type === 'completeness') {
                    return (
                      <Artifact key={i} icon="&#9888;" title="Missing Documents" subtitle={`${block.data.missing.length} not found`}>
                        <div style={{fontSize:13}}>
                          {block.data.missing.map((m, j) => (
                            <div key={j} style={{padding:'4px 0', display:'flex', alignItems:'center', gap:8}}>
                              <span style={{color: m.includes('CRITICAL') ? '#dc2626' : '#d97706', fontSize:16}}>
                                {m.includes('CRITICAL') ? '●' : '○'}
                              </span>
                              <span style={{color: m.includes('CRITICAL') ? '#dc2626' : '#854d0e'}}>{m}</span>
                            </div>
                          ))}
                        </div>
                        <div style={{marginTop:10, fontSize:12, color:'var(--text-muted)', fontStyle:'italic'}}>
                          Pipeline will continue — missing documents will be noted in the report.
                        </div>
                      </Artifact>
                    );
                  }
                  if (block.type === 'classification') {
                    return <ClassificationArtifact key={i} block={block} projectId={projectId} />;
                  }
                  if (block.type === 'classification_review') {
                    return <ClassificationReviewArtifact key={i} block={block} projectId={projectId} onApprove={(changedFiles) => continueAfterReview(projectId, changedFiles)} />;
                  }
                  if (block.type === 'rec') {
                    const rd = block.data;
                    const s = rd.summary || {};
                    const recs = rd.recs || [];
                    const severityBadge = (sev) => sev === 'high' ? 'badge-red' : sev === 'medium' ? 'badge-yellow' : 'badge-green';
                    const classBadge = (cls) => cls === 'REC' ? 'badge-red' : cls === 'CREC' ? 'badge-yellow' : cls === 'HREC' ? 'badge-blue' : 'badge-gray';
                    return (
                      <Artifact key={i} icon="&#9888;" title="Environmental Conditions (RECs)" subtitle={`${recs.length} finding(s) — Risk: ${s.overallRiskLevel || 'unknown'}`}>
                        <div className="stat-grid" style={{marginBottom:14}}>
                          <div className="stat-card" style={{background:'#fee2e2'}}><div className="value" style={{color:'#991b1b'}}>{s.totalRECs||0}</div><div className="label">RECs</div></div>
                          <div className="stat-card" style={{background:'#fef9c3'}}><div className="value" style={{color:'#854d0e'}}>{s.totalCRECs||0}</div><div className="label">CRECs</div></div>
                          <div className="stat-card" style={{background:'#dbeafe'}}><div className="value" style={{color:'#1e40af'}}>{s.totalHRECs||0}</div><div className="label">HRECs</div></div>
                          <div className="stat-card" style={{background:'#f3f4f6'}}><div className="value" style={{color:'#374151'}}>{s.totalDeMinimis||0}</div><div className="label">De Minimis</div></div>
                        </div>
                        <table className="result-table">
                          <thead><tr><th>ID</th><th>Classification</th><th>Finding</th><th>Location</th><th>Severity</th></tr></thead>
                          <tbody>
                            {recs.map((r, j) => (
                              <tr key={j}>
                                <td style={{fontWeight:600,whiteSpace:'nowrap'}}>{r.id}</td>
                                <td><span className={'badge '+classBadge(r.classification)}>{r.classification}</span></td>
                                <td>
                                  <div style={{fontWeight:600,fontSize:13}}>{r.title}</div>
                                  <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2,maxWidth:300}}>{r.description.substring(0,120)}{r.description.length>120?'...':''}</div>
                                </td>
                                <td style={{fontSize:12,whiteSpace:'nowrap'}}>{r.location}</td>
                                <td><span className={'badge '+severityBadge(r.severity)}>{r.severity}</span></td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </Artifact>
                    );
                  }
                  if (block.type === 'qc') {
                    const qc = block.data;
                    return (
                      <Artifact key={i} icon={qc.passed ? '✓' : '⚠'} title="Quality Check Results" subtitle={`Score: ${qc.score}/100`}>
                        <div style={{fontSize:13, marginBottom:12, lineHeight:1.6}}>{qc.summary}</div>
                        {(qc.checks || []).map((c, j) => (
                          <div key={j} style={{padding:'4px 0', display:'flex', gap:8, fontSize:13}}>
                            <span style={{color: c.status==='pass' ? '#16a34a' : c.status==='warn' ? '#d97706' : '#dc2626', fontWeight:700}}>
                              {c.status === 'pass' ? '✓' : c.status === 'warn' ? '⚠' : '✗'}
                            </span>
                            <span><strong>{c.label}:</strong> {c.detail}</span>
                          </div>
                        ))}
                        {qc.recordsAnalysis && (
                          <div style={{marginTop:12, padding:12, background:'#f9fafb', borderRadius:8, fontSize:12}}>
                            <div style={{fontWeight:600, marginBottom:4}}>Records Analysis</div>
                            {qc.recordsAnalysis.missingRecords?.length > 0 && (
                              <div style={{color:'#dc2626'}}>Missing: {qc.recordsAnalysis.missingRecords.join(', ')}</div>
                            )}
                            {qc.recordsAnalysis.recommendation && (
                              <div style={{color:'var(--text-muted)', marginTop:4}}>
                                Recommendation: {qc.recordsAnalysis.recommendation.replace(/_/g, ' ')}
                              </div>
                            )}
                          </div>
                        )}
                        {qc.costUsd && <div style={{marginTop:8,fontSize:11,color:'var(--text-muted)'}}>QC cost: ${qc.costUsd}</div>}
                      </Artifact>
                    );
                  }
                  if (block.type === 'ai_qc') {
                    const aqc = block.data;
                    const severityColor = { error: '#dc2626', warning: '#d97706', info: '#2563eb' };
                    const severityIcon = { error: '\u2717', warning: '\u26a0', info: '\u2139' };
                    return (
                      <Artifact key={i} icon={aqc.passed ? '\u2713' : '\u26a0'} title="AI Report Review" subtitle={aqc.passed ? 'Passed' : 'Issues Found'}>
                        <div style={{fontSize:13, marginBottom:12, lineHeight:1.6}}>{aqc.summary}</div>
                        {(aqc.findings || []).length > 0 && (
                          <div style={{display:'flex', flexDirection:'column', gap:6}}>
                            {aqc.findings.map((f, j) => (
                              <div key={j} style={{padding:'8px 12px', borderRadius:8, fontSize:13, display:'flex', gap:8, alignItems:'flex-start',
                                background: f.severity === 'error' ? '#fef2f2' : f.severity === 'warning' ? '#fffbeb' : '#eff6ff'}}>
                                <span style={{color: severityColor[f.severity] || '#6b7280', fontWeight:700, flexShrink:0}}>
                                  {severityIcon[f.severity] || '\u2022'}
                                </span>
                                <div>
                                  <span style={{fontWeight:600}}>[{f.category?.replace(/_/g, ' ')}]</span>{' '}
                                  <span>{f.message}</span>
                                  {f.section && <span style={{color:'var(--text-muted)', fontSize:11, marginLeft:6}}>({f.section})</span>}
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                        {(aqc.findings || []).length === 0 && (
                          <div style={{padding:'8px 12px', borderRadius:8, fontSize:13, background:'#f0fdf4', color:'#166534'}}>
                            No issues detected. Report structure and content look correct.
                          </div>
                        )}
                        <div style={{marginTop:8, display:'flex', gap:12, fontSize:11, color:'var(--text-muted)'}}>
                          {aqc.errorCount > 0 && <span style={{color:'#dc2626'}}>{aqc.errorCount} error(s)</span>}
                          {aqc.warningCount > 0 && <span style={{color:'#d97706'}}>{aqc.warningCount} warning(s)</span>}
                          {aqc.infoCount > 0 && <span style={{color:'#2563eb'}}>{aqc.infoCount} info</span>}
                          {aqc.costUsd && <span>Cost: ${aqc.costUsd}</span>}
                        </div>
                      </Artifact>
                    );
                  }
                  if (block.type === 'research') {
                    const rd = block.data;
                    const gc = rd.geocode || {};
                    const fz = rd.floodZone;
                    const soil = rd.soilData;
                    const epa = rd.regulatoryFindings?.epa || [];
                    const st = rd.regulatoryFindings?.state || [];
                    const sanborn = rd.sanbornMaps || [];
                    const topos = rd.historicalTopos || [];
                    const gw = rd.groundwater;
                    return (
                      <Artifact key={i} icon="&#127758;" title="Address Research Complete" subtitle={gc.formattedAddress || ''}>
                        <div className="stat-grid" style={{marginBottom:14}}>
                          <div className="stat-card" style={{background:'#dbeafe'}}><div className="value" style={{color:'#1e40af',fontSize:16}}>{gc.lat?.toFixed(4)}, {gc.lng?.toFixed(4)}</div><div className="label">Coordinates</div></div>
                          <div className="stat-card" style={{background: fz?.inFloodplain ? '#fee2e2' : '#dcfce7'}}><div className="value" style={{color: fz?.inFloodplain ? '#991b1b' : '#166534', fontSize:16}}>{fz?.zone || 'N/A'}</div><div className="label">Flood Zone</div></div>
                          <div className="stat-card" style={{background:'#fef9c3'}}><div className="value" style={{color:'#854d0e'}}>{epa.length}</div><div className="label">EPA Sites</div></div>
                          <div className="stat-card" style={{background:'#f3e8ff'}}><div className="value" style={{color:'#6b21a8'}}>{st.length}</div><div className="label">State Sites</div></div>
                          <div className="stat-card" style={{background:'#fff7ed'}}><div className="value" style={{color:'#9a3412'}}>{sanborn.length}</div><div className="label">Sanborn Maps</div></div>
                          <div className="stat-card" style={{background:'#ecfdf5'}}><div className="value" style={{color:'#065f46'}}>{topos.length}</div><div className="label">USGS Topos</div></div>
                          <div className="stat-card" style={{background:'#eff6ff'}}><div className="value" style={{color:'#1e3a8a'}}>{gw?.siteCount || 0}</div><div className="label">GW Wells</div></div>
                          <div className="stat-card" style={{background:'#fdf2f8'}}><div className="value" style={{color:'#9d174d'}}>{rd.streetViewCount || 0}</div><div className="label">Street View</div></div>
                          {rd.ejscreen && <div className="stat-card" style={{background:'#fefce8'}}><div className="value" style={{color:'#713f12', fontSize:13}}>EJ Data</div><div className="label">EJScreen</div></div>}
                        </div>
                        {soil && <div style={{fontSize:13, marginBottom:8}}>Soil: {soil.soilTypes?.join(', ') || 'N/A'} | Drainage: {soil.drainageClass || 'N/A'} | Hydro Group: {soil.hydrologicGroup || 'N/A'}</div>}
                        {epa.length > 0 && (
                          <div style={{marginTop:8}}>
                            <div style={{fontSize:12, fontWeight:700, color:'var(--text-muted)', marginBottom:4}}>EPA Facilities Nearby</div>
                            <table className="result-table">
                              <thead><tr><th>Facility</th><th>Database</th><th>Distance</th><th>Status</th></tr></thead>
                              <tbody>
                                {epa.slice(0,10).map((f, j) => (
                                  <tr key={j}>
                                    <td style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={f.facilityName}>{f.facilityName}</td>
                                    <td><span className="badge badge-blue">{f.database}</span></td>
                                    <td>{f.distance}</td>
                                    <td><span className={'badge '+(f.status==='Active'?'badge-yellow':'badge-gray')}>{f.status}</span></td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        )}
                        {rd.hasSatellite && (
                          <div style={{marginTop:12, textAlign:'center'}}>
                            <img src={'/uploads/' + rd.projectId + '/satellite_aerial.png'} alt="Satellite" style={{maxWidth:'100%', borderRadius:8, border:'1px solid var(--border)'}} />
                            <div style={{fontSize:11, color:'var(--text-muted)', marginTop:4}}>Satellite imagery (Google Maps)</div>
                          </div>
                        )}
                        <div style={{marginTop:12, fontSize:12, color:'var(--text-muted)'}}>
                          Sources: {(rd.dataSources||[]).map(d => d.name).join(', ')}
                        </div>
                        <div style={{marginTop:12, display:'flex', gap:8}}>
                          <button className="reset-btn" style={{flex:1}} onClick={() => { setPhase('idle'); setBlocks([]); setFiles([]); }}>
                            Upload documents to this project
                          </button>
                          <button className="reset-btn" style={{flex:1}} onClick={() => { setPhase('idle'); setBlocks([]); setPid(null); setFiles([]); }}>
                            &#43; New Research
                          </button>
                        </div>
                      </Artifact>
                    );
                  }
                  if (block.type === 'result') {
                    const d = block.data;
                    return <ResultArtifact key={i} data={d} projectId={projectId} onReset={() => { setPhase('idle'); setBlocks([]); setPid(null); setFiles([]); }} />;
                  }
                  return null;
                })}

                {/* Site Visit Mode */}
                {currentView === 'report' && siteVisitActive && projectId && (
                  <SiteVisitPanel projectId={projectId} onObservation={(o) => {
                    setBlocks(prev => [...prev, { type: 'msg', text: `Site observation [${o.category}${o.potentialConcern ? ' ⚠' : ''}]: ${o.text}` }]);
                  }} />
                )}

                {/* Running spinner at bottom */}
                {currentView === 'report' && phase === 'running' && (
                  <div style={{textAlign:'center', padding:20, fontSize:13, color:'var(--text-muted)'}}>
                    <div className="spinner" style={{display:'inline-block', marginRight:8, verticalAlign:'middle'}}></div>
                    Pipeline running...
                  </div>
                )}

                {/* Error state */}
                {currentView === 'report' && phase === 'error' && (
                  <div style={{textAlign:'center', padding:20}}>
                    <button className="reset-btn" onClick={reset} style={{maxWidth:300, margin:'0 auto'}}>
                      &#8634; Try Again
                    </button>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
