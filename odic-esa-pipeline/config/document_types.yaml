# ODIC ESA Pipeline - Document Type Definitions
# Defines all document types that can appear in Phase I ESAs
# Used by the classifier skill to categorize incoming documents

document_types:
  sanborn_map:
    name: "Sanborn Fire Insurance Map"
    description: "Historical land use maps from Sanborn Map Company"
    keywords:
      - "sanborn"
      - "fire insurance"
      - "sanborn map"
      - "sanborn fire insurance"
    visual_indicators:
      - "Color-coded building footprints"
      - "Street layouts with building materials noted"
      - "Fire protection infrastructure"
    typical_dates: "1867-1970"
    esa_sections:
      - "4.3"  # Historical Use Information
      - "5.3"  # Sanborn Maps
      - "appendix_b"

  topographic_map:
    name: "Topographic Map"
    description: "USGS topographic maps showing terrain and features"
    keywords:
      - "usgs"
      - "topographic"
      - "topo"
      - "quadrangle"
      - "elevation"
      - "contour"
    visual_indicators:
      - "Contour lines showing elevation"
      - "USGS logo/seal"
      - "Scale bars and grid references"
    typical_dates: "Various"
    esa_sections:
      - "5.2"  # Topographic Maps
      - "appendix_b"

  aerial_photograph:
    name: "Aerial Photograph"
    description: "Historical aerial imagery of the site and surroundings"
    keywords:
      - "aerial"
      - "photograph"
      - "imagery"
      - "orthophoto"
      - "bird's eye"
      - "flight date"
      - "flight line"
      - "photo number"
      - "aerial photograph"
      - "farm service agency"
      - "photo source"
      - "photo center"
      - "coverage area"
    visual_indicators:
      - "Overhead view of land"
      - "Date stamps or flight information"
      - "Scale indicators"
    typical_dates: "1930s-present"
    esa_sections:
      - "5.1"  # Aerial Photographs
      - "appendix_b"

  city_directory:
    name: "City Directory"
    description: "Historical business and resident listings"
    keywords:
      - "city directory"
      - "polk"
      - "haines"
      - "cole's"
      - "business directory"
      - "resident listing"
    visual_indicators:
      - "Alphabetical listings"
      - "Street address indexes"
      - "Business classifications"
    typical_dates: "1850s-1990s"
    esa_sections:
      - "4.3"  # Historical Use Information

  fire_insurance_map:
    name: "Fire Insurance Map (Non-Sanborn)"
    description: "Fire insurance maps from providers other than Sanborn"
    keywords:
      - "fire insurance"
      - "perris"
      - "baist"
      - "bromley"
    visual_indicators:
      - "Building footprints with construction materials"
      - "Insurance-related annotations"
    typical_dates: "1850s-1950s"
    esa_sections:
      - "4.3"  # Historical Use Information
      - "appendix_b"

  edr:
    name: "Environmental Database Report"
    description: "EDR or similar regulatory database search results"
    keywords:
      - "edr"
      - "environmental data resources"
      - "database search"
      - "radius map"
      - "regulatory database"
      - "cerclis"
      - "rcra"
      - "lust"
      - "ust"
    visual_indicators:
      - "Regulatory database listings"
      - "Radius maps"
      - "Site identification numbers"
    typical_dates: "Current"
    esa_sections:
      - "4.1"  # Environmental Database Report
      - "appendix_c"

  title_record:
    name: "Title Record"
    description: "Property ownership and chain of title documentation"
    keywords:
      - "title"
      - "deed"
      - "ownership"
      - "chain of title"
      - "property record"
      - "grantor"
      - "grantee"
    visual_indicators:
      - "Legal descriptions"
      - "Recording stamps"
      - "Notary seals"
    typical_dates: "Various"
    esa_sections:
      - "4.3"  # Historical Use Information

  tax_record:
    name: "Tax Record"
    description: "Property tax documentation and assessments"
    keywords:
      - "tax"
      - "assessment"
      - "assessor"
      - "parcel"
      - "property tax"
    visual_indicators:
      - "Tax lot numbers"
      - "Assessed values"
      - "Tax district information"
    typical_dates: "Various"
    esa_sections:
      - "4.3"  # Historical Use Information

  building_permit:
    name: "Building Permit"
    description: "Construction and renovation permits"
    keywords:
      - "building permit"
      - "construction permit"
      - "renovation"
      - "certificate of occupancy"
      - "building department"
    visual_indicators:
      - "Permit numbers"
      - "Building department stamps"
      - "Contractor information"
    typical_dates: "Various"
    esa_sections:
      - "4.3"  # Historical Use Information

  site_photograph:
    name: "Site Photograph"
    description: "Current condition photographs from site reconnaissance"
    keywords:
      - "site photo"
      - "photograph"
      - "site visit"
      - "current condition"
      - "reconnaissance"
    visual_indicators:
      - "Date stamps"
      - "Photo logs"
      - "Direction indicators"
    typical_dates: "Current"
    esa_sections:
      - "6.0"  # Site Reconnaissance
      - "appendix_a"

  regulatory_correspondence:
    name: "Regulatory Correspondence"
    description: "Letters and communications from EPA, state agencies, etc."
    keywords:
      - "epa"
      - "environmental protection"
      - "state agency"
      - "regulatory"
      - "notice of violation"
      - "compliance"
      - "enforcement"
    visual_indicators:
      - "Agency letterhead"
      - "Official stamps/seals"
      - "Case/file numbers"
    typical_dates: "Various"
    esa_sections:
      - "4.2"  # Regulatory Agency Records
      - "appendix_d"

  prior_environmental_report:
    name: "Prior Environmental Report"
    description: "Previous Phase I, Phase II, or other environmental assessments prepared FOR this project/property by ODIC or for the same client"
    keywords:
      - "odic environmental"
      - "odic"
      - "prior phase i"
      - "prior phase ii"
      - "prior environmental"
      - "previous assessment"
      - "previous phase"
      - "previous esa"
      - "previous environmental"
      - "prior esa"
      - "prior report"
    visual_indicators:
      - "Professional certifications"
      - "ESA report formatting"
      - "Site maps and figures"
      - "Same property address as current project"
      - "Same or related project number"
      - "ODIC Environmental letterhead"
    typical_dates: "Various"
    esa_sections:
      - "4.0"  # Records Review

  reference_report:
    name: "Reference Report (Third-Party)"
    description: "Environmental reports from OTHER companies included as supporting documentation. These are reports prepared by different firms, for different projects, or for neighboring/related properties - NOT the current project's own report."
    keywords:
      - "phase i"
      - "phase ii"
      - "environmental site assessment"
      - "esa"
      - "environmental report"
      - "assessment"
      - "investigation"
    visual_indicators:
      - "DIFFERENT company name/logo than ODIC Environmental"
      - "Different project number format"
      - "Different property address (adjacent or nearby property)"
      - "Different report date (often historical reference)"
      - "Letterhead from another environmental consulting firm"
    differentiation_signals:
      - "Company name does NOT match ODIC Environmental"
      - "Project number format differs from ODIC conventions"
      - "Address is for adjacent, nearby, or different property"
      - "Used as supporting/reference documentation, not primary assessment"
      - "May reference properties that could impact the subject site"
    typical_dates: "Various (often older than current project date)"
    esa_sections:
      - "4.0"  # Records Review - historical/reference section
      - "appendix"  # Supporting documentation appendix

  client_correspondence:
    name: "Client Correspondence"
    description: "Emails, letters, and communications from the client"
    keywords:
      - "client"
      - "correspondence"
      - "email"
      - "letter"
      - "request"
      - "authorization"
    visual_indicators:
      - "Email headers"
      - "Company letterhead"
      - "Signatures"
    typical_dates: "Current"
    esa_sections:
      - "3.0"  # User Provided Information

  lab_results:
    name: "Laboratory Results"
    description: "Soil, water, or air sampling analytical data (Phase II)"
    keywords:
      - "laboratory"
      - "analytical"
      - "sample"
      - "soil"
      - "groundwater"
      - "detection limit"
      - "chain of custody"
    visual_indicators:
      - "Lab certifications"
      - "QA/QC data"
      - "Chain of custody forms"
    typical_dates: "Current"
    esa_sections:
      - "appendix"  # Phase II appendices

  other:
    name: "Other/Unknown"
    description: "Unclassified document requiring manual review"
    keywords: []
    visual_indicators: []
    typical_dates: "N/A"
    esa_sections: []
    requires_manual_review: true

# Classification settings
classification:
  confidence_threshold: 0.90      # Below this, flag for manual review
  use_visual_analysis: false      # Enable vision model for image-heavy docs
  max_text_chars: 50000           # Max characters to send to classifier
  chunk_overlap: 500              # Overlap when chunking large documents
