# ODIC ESA Pipeline - Main Configuration
# Adjust settings without touching code

ftp:
  host: ""                        # ODIC's FTP server hostname
  port: 22                        # SFTP port (22) or FTP port (21)
  username: ""                    # FTP username
  password: ""                    # FTP password (prefer env var: FTP_PASSWORD)
  watch_directory: "/incoming"    # Directory to monitor for new files
  poll_interval_seconds: 30       # How often to check for new files

llm:
  api_key_env: "ANTHROPIC_API_KEY"                       # Environment variable containing API key
  classifier_model: "claude-haiku-4-5-20251001"          # Fast + cheap for classification
  reasoning_model: "claude-sonnet-4-5-20250929"          # Accurate for QA and assembly
  max_retries: 3                                         # Retry attempts for API failures
  timeout_seconds: 120                                   # Request timeout

pipeline:
  project_base_dir: "./projects"             # Where project folders are created
  output_dir: "./completed_reports"          # Where final ESA reports go
  failed_dir: "./failed"                     # Where failed documents go for review
  max_concurrent_projects: 5                 # Parallel project processing limit
  auto_assemble_when_complete: true          # Auto-generate report when all docs present
  confidence_threshold: 0.90                 # Classification confidence threshold (90%)

qa:
  minimum_sections_required: 8               # Minimum sections for valid ESA
  require_site_photos: true                  # Site photos mandatory
  require_edr: true                          # EDR report mandatory
  require_topo: true                         # Topographic map mandatory

compressor:
  target_max_size_mb: 25                     # Target max file size (for email delivery)
  target_dpi: 150                            # DPI for downsampling images
  jpeg_quality: 75                           # JPEG quality (1-100)
  strip_metadata: true                       # Remove PDF metadata
  remove_duplicates: true                    # Remove duplicate objects

splitter:
  max_size_mb: 25                            # Max chunk size when splitting
  min_pages_per_chunk: 1                     # Minimum pages per split chunk

notifications:
  enabled: false                             # Enable/disable notifications
  type: "email"                              # email, slack, or both
  recipients: []                             # Email addresses to notify
  smtp_host: ""                              # SMTP server hostname
  smtp_port: 587                             # SMTP port
  smtp_username: ""                          # SMTP username
  smtp_password_env: "SMTP_PASSWORD"         # Env var for SMTP password

logging:
  level: "INFO"                              # DEBUG, INFO, WARNING, ERROR
  format: "json"                             # json or text
  file: "./logs/pipeline.log"                # Log file path

debug: false                                 # Enable debug mode
